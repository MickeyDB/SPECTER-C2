syntax = "proto3";

package specter.v1;

import "google/protobuf/timestamp.proto";

message ProfileInfo {
  string id = 1;
  string name = 2;
  string description = 3;
  string yaml_content = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// Domain fronting configuration within a profile.
// When set, implants use front_domain for TLS SNI and actual_domain for
// the HTTP Host header, hiding the true C2 destination behind a
// high-reputation domain on the same CDN.
message DomainFrontingConfig {
  // High-reputation domain placed in TLS SNI (ClientHello).
  string front_domain = 1;
  // Actual C2 domain placed in HTTP Host header, routed by CDN to teamserver.
  string actual_domain = 2;
}

message CreateProfileRequest {
  string name = 1;
  string description = 2;
  string yaml_content = 3;
}

message CreateProfileResponse {
  ProfileInfo profile = 1;
}

message ListProfilesRequest {}

message ListProfilesResponse {
  repeated ProfileInfo profiles = 1;
}

message GetProfileRequest {
  string id = 1;
}

message GetProfileResponse {
  ProfileInfo profile = 1;
}

message CompileProfileRequest {
  string id = 1;
}

message CompileProfileResponse {
  bytes compiled_blob = 1;
}
