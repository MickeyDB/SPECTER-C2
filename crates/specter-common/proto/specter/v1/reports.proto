syntax = "proto3";

package specter.v1;

import "google/protobuf/timestamp.proto";

enum ReportFormatProto {
  REPORT_FORMAT_MARKDOWN = 0;
  REPORT_FORMAT_JSON = 1;
}

message ReportIncludeSections {
  bool timeline = 1;
  bool ioc_list = 2;
  bool findings = 3;
  bool recommendations = 4;
}

message GenerateReportRequest {
  string campaign_id = 1;
  google.protobuf.Timestamp time_range_start = 2;
  google.protobuf.Timestamp time_range_end = 3;
  ReportIncludeSections include_sections = 4;
  string operator_filter = 5;
  ReportFormatProto format = 6;
}

message GenerateReportResponse {
  ReportInfo report = 1;
}

message ReportInfo {
  string id = 1;
  string campaign_id = 2;
  string campaign_name = 3;
  string format = 4;
  string content = 5;
  google.protobuf.Timestamp created_at = 6;
  string created_by = 7;
}

message ListReportsRequest {}

message ListReportsResponse {
  repeated ReportInfo reports = 1;
}

message GetReportRequest {
  string id = 1;
}

message GetReportResponse {
  ReportInfo report = 1;
}
