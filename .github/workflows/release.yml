name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-release:
    name: Build Release (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            server_bin: specter-server
            client_bin: specter-client
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            server_bin: specter-server
            client_bin: specter-client
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            server_bin: specter-server.exe
            client_bin: specter-client.exe
            archive: zip
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
      - name: Build release binaries
        run: cargo build --release --workspace
      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.server_bin }} dist/
          cp target/release/${{ matrix.client_bin }} dist/
          tar -czf specter-${{ github.ref_name }}-${{ matrix.target }}.tar.gz -C dist .
      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/release/${{ matrix.server_bin }}" dist/
          Copy-Item "target/release/${{ matrix.client_bin }}" dist/
          Compress-Archive -Path dist/* -DestinationPath "specter-${{ github.ref_name }}-${{ matrix.target }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: specter-${{ github.ref_name }}-${{ matrix.target }}.*

  build-implant-release:
    name: Build Implant Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MinGW-w64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - name: Build implant
        run: make -C implant
      - name: Build modules
        run: make -C implant modules
      - uses: actions/upload-artifact@v4
        with:
          name: release-implant
          path: implant/build/

  build-webui-release:
    name: Build Web UI Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: cd web && npm ci && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: release-web-dist
          path: web/dist/

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-release, build-implant-release, build-webui-release]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Collect release assets
        run: |
          mkdir -p release-assets
          find artifacts/ -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} release-assets/ \;
          cd artifacts/release-implant && tar -czf ../../release-assets/specter-implant-${{ github.ref_name }}.tar.gz . && cd ../..
          cd artifacts/release-web-dist && tar -czf ../../release-assets/specter-web-${{ github.ref_name }}.tar.gz . && cd ../..
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
