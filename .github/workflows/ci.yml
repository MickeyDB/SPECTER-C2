name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo clippy --workspace -- -D warnings

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
      - name: Install protobuf compiler
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - run: cargo test --workspace

  build-teamserver:
    name: Build Teamserver (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: specter-server
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: specter-server
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: specter-server.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-build-server-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release -p specter-server
      - uses: actions/upload-artifact@v4
        with:
          name: teamserver-${{ matrix.target }}
          path: target/release/${{ matrix.artifact }}

  build-client:
    name: Build Client (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: specter-client
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: specter-client
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: specter-client.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-build-client-${{ hashFiles('**/Cargo.lock') }}
      - run: cargo build --release -p specter-client
      - uses: actions/upload-artifact@v4
        with:
          name: client-${{ matrix.target }}
          path: target/release/${{ matrix.artifact }}

  build-implant:
    name: Build Implant (MinGW Cross-Compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MinGW-w64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - name: Build implant PIC blob
        run: make -C implant
      - name: Check implant size
        run: make -C implant size
      - uses: actions/upload-artifact@v4
        with:
          name: implant-pic-blob
          path: |
            implant/build/specter.bin
            implant/build/specter.map

  build-modules:
    name: Build Implant Modules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MinGW-w64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - name: Build modules
        run: make -C implant modules
      - uses: actions/upload-artifact@v4
        with:
          name: implant-modules
          path: implant/build/modules/

  test-implant:
    name: Implant Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install MinGW-w64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64 gcc
      - name: Run implant tests
        run: make -C implant test

  build-webui:
    name: Build Web UI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: cd web && npm ci
      - name: Type check
        run: cd web && npm run type-check
      - name: Build
        run: cd web && npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  test-webui:
    name: Web UI Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: cd web && npm ci
      - name: Lint
        run: cd web && npm run lint
      - name: Run tests
        run: cd web && npm test

  yara-scan:
    name: YARA Scan
    runs-on: ubuntu-latest
    needs: [build-implant]
    steps:
      - uses: actions/checkout@v4
      - name: Install YARA Python bindings
        run: pip install yara-python
      - uses: actions/download-artifact@v4
        with:
          name: implant-pic-blob
          path: implant/build/
      - name: YARA scan implant
        run: |
          python3 -c "
          import yara, sys, glob, os

          rule_files = glob.glob('rules/*.yar') + glob.glob('rules/*.yara')
          if not rule_files:
              print('No YARA rules found, skipping scan')
              sys.exit(0)

          blob = 'implant/build/specter.bin'
          if not os.path.isfile(blob):
              print(f'ERROR: {blob} not found')
              sys.exit(1)

          # Compile all rule files
          filepaths = {f'ns{i}': path for i, path in enumerate(rule_files)}
          rules = yara.compile(filepaths=filepaths)
          matches = rules.match(blob)

          if matches:
              print('YARA DETECTIONS:')
              for m in matches:
                  sev = m.meta.get('severity', 'unknown')
                  desc = m.meta.get('description', '')
                  print(f'  [{sev.upper()}] {m.rule}: {desc}')

              # Fail only on critical severity
              if any(m.meta.get('severity') == 'critical' for m in matches):
                  print()
                  print('FATAL: Critical detections found — payload must not ship')
                  sys.exit(1)
              else:
                  print()
                  print('WARNING: Non-critical detections found (review before engagement)')
          else:
              print('No YARA detections - clean build')
          "

  yara-scan-public:
    name: YARA Scan (Public Rules)
    runs-on: ubuntu-latest
    needs: [build-implant]
    steps:
      - uses: actions/checkout@v4
      - name: Install YARA Python bindings
        run: pip install yara-python
      - uses: actions/download-artifact@v4
        with:
          name: implant-pic-blob
          path: implant/build/
      - name: Download public YARA rules
        run: |
          git clone --depth 1 https://github.com/Neo23x0/signature-base.git /tmp/signature-base
          git clone --depth 1 https://github.com/Yara-Rules/rules.git /tmp/yara-rules
          git clone --depth 1 https://github.com/elastic/protections-artifacts.git /tmp/elastic-rules
          git clone --depth 1 https://github.com/reversinglabs/reversinglabs-yara-rules.git /tmp/rl-rules
      - name: Scan against public rules
        run: python3 scripts/scan-public-rules.py implant/build/specter.bin

  implant-verify:
    name: Implant Verification
    runs-on: ubuntu-latest
    needs: [build-implant]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: implant-pic-blob
          path: implant/build/
      - name: Check implant size
        run: |
          SIZE=$(stat -f%z implant/build/specter.bin 2>/dev/null || stat -c%s implant/build/specter.bin)
          echo "Implant size: $SIZE bytes"
          if [ "$SIZE" -gt 524288 ]; then
            echo "WARNING: Implant exceeds 512KB limit ($SIZE bytes)"
          elif [ "$SIZE" -gt 262144 ]; then
            echo "NOTE: Implant exceeds 256KB target ($SIZE bytes) — within 512KB limit"
          else
            echo "OK: Implant within 256KB target"
          fi
      - name: Check syscall gadget diversity
        run: |
          python3 -c "
          data = open('implant/build/specter.bin', 'rb').read()
          count = 0
          for i in range(len(data) - 2):
              if data[i:i+3] == b'\x0f\x05\xc3':
                  count += 1
          print(f'Syscall gadgets (0F 05 C3) in blob: {count}')
          if count > 0:
              print('WARNING: syscall;ret gadgets found in PIC blob (expected only in ntdll)')
          else:
              print('OK: No syscall;ret gadgets in blob')
          "
      - name: Check for .refptr entries
        run: |
          if [ -f implant/build/specter.map ]; then
            REFPTR_COUNT=$(grep -c "refptr" implant/build/specter.map || true)
            if [ "$REFPTR_COUNT" -gt 0 ]; then
              echo "WARNING: $REFPTR_COUNT .refptr entries found — PIC may crash"
              grep "refptr" implant/build/specter.map
            else
              echo "OK: No .refptr entries — PIC is clean"
            fi
          else
            echo "SKIP: No linker map file found (specter.map)"
          fi
